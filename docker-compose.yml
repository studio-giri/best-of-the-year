services:
  db:
    image: postgres:18
    # Dev DB must not outlive dev sessions: no auto-start on boot, no
    # resurrection by the Docker daemon. Bring it up explicitly with
    # `bun db:up`. (Quotes are required: unquoted `no` is YAML for false.)
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-3003}:5432"
    volumes:
      - best_of_the_year_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local email sink: captures every message the backend sends over SMTP so no
  # real mail leaves the machine in development. SMTP on 1025, web UI on 8025
  # (http://localhost:8025). Same restart policy as the DB — explicit `bun db:up`
  # only, never resurrected by the daemon.
  mailpit:
    image: axllent/mailpit:v1.30.4
    restart: "no"
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  best_of_the_year_db_data:
